<!DOCTYPE html>
<html>

<head>
    <title>Healthcare Document Parser</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container">

    <h1>Healthcare Document Parser</h1>

    <div class="input-section">

        <label for="documentType">Document Type</label>

        <select id="documentType" name="documentType">
            <option value="prescription">Prescription</option>
            <option value="referral">Referral</option>
        </select>

        <br><br>

        <textarea
            id="documentText"
            rows="10"
            cols="60"
            placeholder="Paste healthcare document text here">
        </textarea>

        <br><br>

        <button onclick="analyzeDocument()">
            Analyze Document
        </button>

    </div>

    <div class="output-section">

        <div id="loadingBox"></div>

        <div id="errorBox"></div>

        <div id="confidenceBox"></div>

        <div id="summaryBox"></div>

        <div id="issuesBox"></div>

        <div id="recommendationBox"></div>

    </div>

</div>

<script src="/static/script.js?v=5"></script>

</body>
</html>
